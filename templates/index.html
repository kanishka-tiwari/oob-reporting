<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Out of Box Reporting Portal</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-6"><div class="max-w-xl w-full bg-gray-800 rounded-xl shadow-2xl p-8 border border-gray-700"><h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-blue-500 mb-2 text-center">Out of Box Reporting</h1><p class="text-gray-400 text-center mb-8 text-sm">Upload your financial Excel documents for real-time AI enterprise auditing.</p><form action="/upload/" method="post" enctype="multipart/form-data" class="space-y-6"><div class="border-2 border-dashed border-gray-600 rounded-lg p-8 text-center hover:border-teal-500 transition cursor-pointer relative"><input type="file" name="file" accept=".xlsx, .xls" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"><svg class="mx-auto h-12 w-12 text-gray-400 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg><p class="text-sm text-gray-300 font-medium">Drag and drop your Excel file here, or <span class="text-teal-400 font-semibold">browse</span></p><p class="text-xs text-gray-500 mt-1">Supports .xlsx and .xls formats</p></div><button type="submit" class="w-full bg-gradient-to-r from-teal-500 to-blue-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg hover:from-teal-600 hover:to-blue-700 transition focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 focus:ring-offset-gray-800">Generate Audit Report</button></form></div></body></html>
